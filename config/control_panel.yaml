###################################################################################################
# GAME MAIN SETTINGS                                                                              #
###################################################################################################
# Full docs: github.com/diegomics/GAME/wiki/Control_Panel#main-settings
 
# GAME data table | "google-spreadsheet-link" / "xlsx-path" (or csv/tsv/txt path)
## Fixed columns (see example). Paths must be on binded partition in the container (see /execution)
DATA_TABLE: "https://docs.google.com/spreadsheets/d/1WzM6GReGG_2oiKBuVbZZvO1UfZxEpJ3pIFQB3R8AkTY/edit?usp=sharing"

# Output location (a "GAME_results" folder is created here) | "/path"
## The base of the path must be on binded partition in the container (see GAME/execution configs)
OUT_FOLDER: "/scratch/ddepanis/Parrots_project"

# Per-job max resources
myCPU: 24    # max cores per job | 2-24
myRAM: 512   # max RAM per job, GB | min 4
myRUN: 240   # max time per job, HOURS

# Temp dir for intermediate files | "default" (OUT_FOLDER/tmp) / "auto" (local SSD) / "/path"
TEMP_DIR: auto

# Fast temp for I/O-heavy steps | "default" (OUT_FOLDER/tmp) / "/dev/shm" or RAM-mount path
## This is CRITICAL for Repeat Masking!
FAST_TEMP_DIR: "/dev/shm"



###################################################################################################
# OPTIONAL SETTINGS                                                                               #
###################################################################################################

# Quick reference QC  -----------------------------------------------------------------------------
# Full docs: github.com/diegomics/GAME/wiki/Control_Panel#reference-qc

# Gene completeness analysis (off = gfastats classic metrics only) | "on" / "off" (default)
RUN_COMPL: off

# BUSCO lineage | auto (may fail) / <name> e.g. eukaryota, primates, insecta, fungi
LINEAGE: eukaryota


# Masking  ----------------------------------------------------------------------------------------
# Full docs: github.com/diegomics/GAME/wiki/Control_Panel#masking

# Reference assembly masking | "auto" (BED from softmask) / "on" (RepeatModeler+Masker) / "off"
MASKING: auto


# Reads -------------------------------------------------------------------------------------------
# Full docs: github.com/diegomics/GAME/wiki/Control_Panel#reads-data

# Trim short paired-end reads (Illumina/10x) | "on" / "off"
TRIM_PE: on

# Filter adapter-containing HiFi reads | "on" / "off"
FILTER_HIFI: off

# Correct ONT reads (uses Hifiasm, may be slow!) | "on" / "off"
## For GATK only. DO NOT use it for DeepVariant!
CORRECT_ONT: off


# Mapping -----------------------------------------------------------------------------------------
# Full docs: github.com/diegomics/GAME/wiki/Control_Panel#mapping

# Map reads (off = assembly stats + reads QC only) | "on" / "off"
READS_MAPPING: on

# Deduplicate reads | "on" / "off"  (default: on for PE, off for long)
DEDUP_PE: on
DEDUP_LONG: off

# Downsample mapped reads to a target per-sample coverage | integer e.g. "30". "0" = off (default)
#DOWN_X: 0   # TODO

# Cross-tech BAM merging (GATK only) | "auto" (see below) / "on" / "off" (default)
MERGE_TECH: off

# Merge/selection thresholds (see wiki for the auto logic)
GOOD_TECH_COV: 15     # >= this -> prefer single-tech (no merge) in auto
MIN_TECH_COV: 1       # absolute min coverage for a tech to join a merge
MIN_TECH_FRAC: 0.05   # min fraction of total coverage to join a merge


# Calling -----------------------------------------------------------------------------------------
# Full docs: github.com/diegomics/GAME/wiki/Control_Panel#calling

# Run variant caller | "on" / "off"
RUN_CALLING: off

# Caller tool | "deep" (DeepVariant, recommended) / "gatk" (HaplotypeCaller, needed for merged tech)
## With MERGE_TECH auto/on on a multi-tech sample, GATK is forced regardless of this.
CALLER: deep

# VCF resolution | "block" (gVCF, recommended) / "basepair" (per-site, much larger files)
RESOLUTION: block

# PairHMM AVX (GATK only!) | "auto" (AVX for short reads. Default) / "on" (force) / "off"
USE_AVX: auto

# Tech priority for calling when >1 type/sample | e.g. hifi>illumina>ont
## Picks highest-priority tech >= GOOD_TECH_COV, else highest-priority >= MIN_TECH_COV.
DATA_PRIORITY: hifi>illumina>ont

# IMPROVE THIS!!!!!!!!
SAMPLE_PLOIDY: 2

# Keep gVCF files (needed for joint genotyping) | "on" / "off"
KEEP_gVCF: on

# Joint genotyping via GLnexus (needs CALLER deep + MERGE_TECH off; auto-keeps gVCF() | "on" / "off"
JOINT_GENO: off


# Variants QC & tagging ---------------------------------------------------------------------------
# Full docs: github.com/diegomics/GAME/wiki/Control_Panel#tagging

# Add INFO (TYPE, MASKED) and FILTER (LOW_DP, LOW_GQ...) tags | "on" / "off"
RUN_TAGGING: off

# Tag thresholds below: [shared] both | [gatk] GATK only | [deep] DeepVariant only

MIN_DEPTH: 8       # [shared] min depth | int / auto (floor(WMD/3))
MAX_DEPTH: auto    # [shared] max depth | int / auto (ceil(3*WMD))
MIN_GQ: 10         # [shared] min genotype quality (also LOW_RGQ on hom-ref)
MIN_MQ: 40         # [gatk]   min site mapping quality (INFO/MQ)
MIN_QUAL: 1        # [deep]   min site QUAL (-> LOW_QUAL)

# Allele balance, biallelic diploid | [shared] (GATK from AD, DV from VAF)
AB_HET_MIN: 0.25       # het alt-fraction >= this
AB_HET_MAX: 0.75       # het alt-fraction <= this
AB_HOM_REF_MAX: 0.10   # hom-ref alt-leakage <= this

# Min contig length for downstream analysis, bp | integer
TINY_CONTIG_BP: 1000000

# Keep raw untagged BCF | "on" / "off"  (off saves space. Turn on for custom filtering later)
KEEP_RAW_BCF: on

# Joint genotyping tags
# Only if JOINT_GENO: on AND RUN_TAGGING: on. Site-level only (handle per-sample QC downstream)
MIN_AQ: 10           # [joint] min allele quality (INFO/AQ from GLnexus)
MIN_JOINT_QUAL: 1    # [joint] min site QUAL
MAX_MISSING: 0.5     # [joint] max fraction of ./. samples (-> LOW_CALL_RATE)
MIN_AC: auto         # [joint] min allele count | int / auto (max(1, ceil(AN*MIN_AC_FRAC)))
MIN_AC_FRAC: 0.01    # fraction used when MIN_AC: auto
KEEP_RAW_JOINT: on   # keep raw untagged joint BCF | on/off

# Relatedness & LD pruning tags
# Only if JOINT_GENO: on AND RUN_TAGGING: on.
KING_CUTOFF: 0.0884        # KING-robust kinship to flag as related | default excludes 2nd-degree+
KING_MAF: 0.05             # MAF cutoff before LD pruning
KING_LD_MIN_SAMPLES: 50    # min cohort for LD pruning (below: F03 skips LD, F05 skips annotation)

# plink2 --indep-pairwise | window (SNPs) / step (SNPs) / r2
KING_LD_WINDOW: 50
KING_LD_STEP: 5
KING_LD_R2: 0.2


# TO DO: Heterozygosity ----------------------------------------------------------------------------------

# Run Roller_Coaster to analyse Heterozygosity and ROH
RUN_ROCO: off

# Roller_Coaster mode. Possible valures are "auto" (will run single if only one sample available or
# multi if more than one sample, the later requires JOINT_GENO: on), "single", or "multi"
#ROCO_MODE: auto
#####multi mode creates a results for each sample in folders with sample_name plus multi results

# Window size in bp (default: 20000)
WINDOW: 20000    
# Step size for the sliding window. Possible valures are "auto" (10% of window) or integer number
# (default: auto)
STEP: auto

# Maximum missing data percentage per window
ALLOW_MAX: 20
# Maximum contiguous missing block percentage
ALLOW_CONT: 5

# Low heterozygosity threshold method. Possible valures are "auto" (1/5 of mean chrom het),
# "binomial", or float number.
THRESHOLD: auto

# Chromosomes to exclude. Possible values are "auto" (will exclude declared sex chroms if any),
# "none" (to include all chroms above the length treshold), or a comma-separated list of chrom names.
EXCLUDE: auto

# Tags to avoid. See applied TAGs in the README.
## Possible valures are "all" (to avoid all tags),
## "auto" (to avoid AB_HET,AB_HOM,MULTI_ALT,NON_SNP,NO_DP,NO_GQ,MISS_GT,REF_N,REF_BLK,LOW_DP,LOW_MQ,LOW_GQ),
## "none" (no tags are avoided), or a comma-separated list of tags (i.e., "NON_SNP,NO_DP")
TAGS: auto

# Minimum ROH size in Mb. Less than this size does not count as ROH
NOISE: 0.1

# ROH block colour. Possible values are "mono" (single colour), "simple" (different colours for
# small, medium and large), and detailed (more detailed colours)
BLOCK_COL: mono


# TO DO: Demographic inferenece --------------------------------------------------------------------------

# Tipically, the coverage should be 20x or more for this analysis
RUN_PSMC: off

# Masking behavior
## if there is a MASKED tag, turn on to include all those positions, or off to exclude them
INCLUDE_MASK: on

# PSMC values

# N is maximum number of iterations; t is maximum 2N0 coalescent time (the time it takes
# for two lineages to coalesce in a population of size = 2 * initial Ne); r is initial theta/rho
# ratio (ratio of the mutation rate to the recombination rate).
PARAMS: "-N25 -t15 -r5"

# This variable corresponds to -p (time interval patterns)
## intervals are followed by a "+" symbol to separate them
### The number corresponds to the widths in coalescent time units. The notation is:
### "amount of intervals"*"width"+"amount of intervals"*"width".
INTERV: "4+25*2+4+6"

# Number of resampling iterations
## A higher number of bootstraps generally leads to more precise estimates at computation increase
BOOTST: 10

